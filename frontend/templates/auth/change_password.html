<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Alterar senha</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-[100dvh] bg-sky-50 pb-[max(1rem,env(safe-area-inset-bottom))]">
    <div class="max-w-md mx-auto px-4 py-8 sm:py-10">
      <a href="{{ back_url }}" class="ui-link text-sm">← Voltar</a>
      <div data-auth-panel class="mt-6 bg-white rounded-2xl border border-slate-200 shadow-sm p-6 sm:p-8">
        <h1 class="text-xl font-bold text-slate-900">Alterar senha</h1>
        {% include "partials/flash.html" %}
        <form method="post" class="mt-6 space-y-4">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          {% if next_url %}<input type="hidden" name="next" value="{{ next_url }}" />{% endif %}
          {% if back_url %}<input type="hidden" name="back" value="{{ back_url }}" />{% endif %}
          <div>
            <label class="block text-sm text-slate-600 mb-1">Senha atual</label>
            <input type="password" name="current_password" required class="w-full rounded-xl border px-4 py-3" autocomplete="current-password" />
          </div>
          <div>
            <label class="block text-sm text-slate-600 mb-1">Nova senha</label>
            <input type="password" name="password" required minlength="6" class="w-full rounded-xl border px-4 py-3" autocomplete="new-password" />
          </div>
          <div>
            <label class="block text-sm text-slate-600 mb-1">Confirmar nova senha</label>
            <input type="password" name="password2" required minlength="6" class="w-full rounded-xl border px-4 py-3" autocomplete="new-password" />
          </div>
          <button type="submit" class="ui-btn ui-btn--primary ui-btn--block">Atualizar</button>
        </form>
      </div>
    </div>
    {% include "partials/site_scripts.html" %}
  </body>
</html>
