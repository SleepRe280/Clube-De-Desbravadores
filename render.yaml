# Blueprint Render: https://render.com/docs/blueprint-spec
# Ajuste `name` dos serviços se quiser outros identificadores no painel.
#
# E-mail — Gmail SMTP (sleepre07@gmail.com). No painel Environment, adicione só:
#   MAIL_PASSWORD = senha de app do Google (https://myaccount.google.com/apppasswords)
# Verificação no cadastro (opcional): EMAIL_VERIFICATION_REQUIRED=1
#
# Primeiro diretor (plano free não tem Shell): no Environment do web service, adicione
# DIRECTOR_ADMIN_EMAIL, DIRECTOR_ADMIN_PASSWORD e opcional DIRECTOR_ADMIN_FULL_NAME;
# faça deploy, entre em /login e remova DIRECTOR_ADMIN_PASSWORD.

databases:
  - name: Desbravadores
    plan: free
    databaseName: desbravadores_db

services:
  - type: web
    name: Desbravadores-web
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r backend/requirements-prod.txt
    startCommand: cd backend && gunicorn -w 1 --timeout 120 -b 0.0.0.0:$PORT wsgi:app
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: TRUST_PROXY
        value: "1"
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: PREFERRED_URL_SCHEME
        value: https
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: Desbravadores
          property: connectionString
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "1"
      - key: MAIL_USERNAME
        value: sleepre07@gmail.com
      - key: MAIL_DEFAULT_SENDER
        value: "Clube de Desbravadores <sleepre07@gmail.com>"
